<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Skill-Building Series – Session 05</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Skill-Building Series – Session 05">
  <meta property="og:description" content="From Agent to Trusted Advisor | Join Live on 21 April, 7:45 PM">
  <meta property="og:image" content="https://rasaktraining.github.io/countdown/preview.jpg">
  <meta property="og:url" content="https://rasaktraining.github.io/countdown/">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Skill-Building Series – Session 05">
  <meta name="twitter:description" content="Join Live Training on Zoom">
  <meta name="twitter:image" content="https://rasaktraining.github.io/countdown/preview.jpg">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    h1 {
      font-size: 30px;
    }

    .highlight {
      background: #ffc107;
      color: #000;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      margin: 15px 0;
      display: inline-block;
    }

    .date {
      margin: 10px 0;
      font-size: 18px;
    }

    .countdown {
      font-size: 26px;
      margin: 20px 0;
      font-weight: bold;
    }

    .btn {
      display: block;
      background: #007bff;
      color: white;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      margin: 15px auto;
      width: 80%;
    }

    .zoom-box {
      background: #ffffff;
      color: #000;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .zoom-link {
      word-break: break-all;
      color: #007bff;
      font-size: 14px;
    }

    .copy-btn {
      margin-top: 10px;
      background: #28a745;
      color: white;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .contact {
      margin-top: 20px;
    }

    .small {
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="container">

    <p>AK Rasak Presents</p>

    <h1>Skill-Building Series – Session 05</h1>

    <div class="highlight">
      FROM AGENT → TRUSTED ADVISOR
    </div>

    <div class="date">
      📅 21 April 2026 | 7:45 PM
    </div>

    <div id="countdown" class="countdown">
      Loading...
    </div>

    <!-- Button -->
    <a class="btn" href="https://us06web.zoom.us/j/85000756418" target="_blank">
      Join Zoom Meeting
    </a>

    <!-- Zoom Details -->
    <div class="zoom-box">
      <strong>Zoom Meeting Link:</strong><br>
      <div id="zoomLink" class="zoom-link">
        https://us06web.zoom.us/j/85000756418
      </div>

      <button class="copy-btn" onclick="copyLink()">Copy Link</button>

      <p><strong>Meeting ID:</strong> 850 0075 6418</p>
    </div>

    <div class="contact">
      📞 Sales: 9846220955<br>
      📞 Support: 9846510955
    </div>

    <div class="small">
      Be Ready. Be On Time.
    </div>

  </div>

  <!-- Countdown -->
  <script>
    const targetDate = new Date("April 21, 2026 19:45:00").getTime();

    setInterval(function() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff < 0) {
        document.getElementById("countdown").innerHTML = "Session Started!";
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById("countdown").innerHTML =
        d + "d : " + h + "h : " + m + "m : " + s + "s";
    }, 1000);

    function copyLink() {
      const link = document.getElementById("zoomLink").innerText;
      navigator.clipboard.writeText(link);
      alert("Zoom link copied!");
    }
  </script>

</body>
</html>
